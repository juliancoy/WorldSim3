name: Build Release Artifacts

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build-linux-packages:
    name: Linux Packages (.deb + AppImage)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Install Linux packaging prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            cmake \
            wget \
            file \
            dpkg-dev \
            zip \
            libvulkan-dev \
            libglfw3-dev \
            libcurl4-openssl-dev \
            libssl-dev

      - name: Build Linux release packages
        run: ./scripts/package-linux.sh "${SHORT_SHA}"

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: worldsim3-deb-${{ github.sha }}
          path: dist/worldsim3-${{ env.SHORT_SHA }}.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: worldsim3-appimage-${{ github.sha }}
          path: dist/worldsim3-${{ env.SHORT_SHA }}.AppImage

  build-windows:
    name: Windows .exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        shell: bash
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Install Vulkan SDK
        shell: powershell
        run: |
          choco install vulkan-sdk --yes --no-progress
          $sdkRoot = Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdkRoot) { throw "Vulkan SDK not found under C:\VulkanSDK" }
          "VULKAN_SDK=$($sdkRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($sdkRoot.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install vcpkg dependencies (x64-windows)
        shell: powershell
        run: |
          $vcpkgRoot = if (Test-Path 'C:\vcpkg') { 'C:\vcpkg' } else { "$env:USERPROFILE\vcpkg" }
          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$vcpkgRoot\vcpkg.exe" install curl:x64-windows openssl:x64-windows

      - name: Configure (MSVC)
        shell: bash
        run: |
          cmake -S . -B build-windows -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows \
            -DVulkan_INCLUDE_DIR="${VULKAN_SDK}/Include" \
            -DVulkan_LIBRARY="${VULKAN_SDK}/Lib/vulkan-1.lib"

      - name: Build (MSVC)
        shell: bash
        run: cmake --build build-windows --config Release

      - name: Package Windows artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist/windows | Out-Null
          Copy-Item build-windows/Release/worldsim3.exe dist/windows/
          Copy-Item build-windows/Release/arkavo_connectivity_test.exe dist/windows/
          Copy-Item build-windows/Release/*.dll dist/windows/ -ErrorAction SilentlyContinue
          Copy-Item "$env:VCPKG_ROOT/installed/x64-windows/bin/*.dll" dist/windows/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/windows/* -DestinationPath "dist/worldsim3-${env:SHORT_SHA}-windows.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: worldsim3-exe-${{ github.sha }}
          path: dist/worldsim3-${{ env.SHORT_SHA }}-windows.zip

  publish-release:
    name: Publish Release
    runs-on: ubuntu-22.04
    needs:
      - build-linux-packages
      - build-windows
    steps:
      - name: Download Debian artifact
        uses: actions/download-artifact@v4
        with:
          name: worldsim3-deb-${{ github.sha }}
          path: release-assets

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: worldsim3-appimage-${{ github.sha }}
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: worldsim3-exe-${{ github.sha }}
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          prerelease: true
          files: |
            release-assets/*.deb
            release-assets/*.AppImage
            release-assets/*.zip

      - name: Validate R2 artifact deployment configuration
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          required=(
            "R2_ACCESS_KEY_ID"
            "R2_SECRET_ACCESS_KEY"
            "R2_BUCKET"
            "R2_ENDPOINT"
          )
          for v in "${required[@]}"; do
            if [[ -z "${!v:-}" ]]; then
              echo "Missing required secret: ${v}"
              exit 1
            fi
          done

      - name: Install AWS CLI
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends awscli

      - name: Publish release artifacts to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          DEST="s3://${R2_BUCKET}/worldsim3/releases/${GITHUB_SHA}"
          aws s3 cp release-assets/ "${DEST}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --recursive \
            --exclude "*" \
            --include "*.deb" \
            --include "*.AppImage" \
            --include "*.zip" \
            --cache-control "public, max-age=31536000, immutable" \
            --only-show-errors

  publish-apt-repo:
    name: Publish APT Repository
    runs-on: ubuntu-22.04
    needs:
      - build-linux-packages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Debian artifact
        uses: actions/download-artifact@v4
        with:
          name: worldsim3-deb-${{ github.sha }}
          path: apt-artifacts

      - name: Build APT repository structure
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev apt-utils

          mkdir -p apt-repo/pool/main
          cp -v apt-artifacts/*.deb apt-repo/pool/main/

          mkdir -p apt-repo/dists/stable/main/binary-amd64
          dpkg-scanpackages apt-repo/pool /dev/null > apt-repo/dists/stable/main/binary-amd64/Packages
          gzip -9c apt-repo/dists/stable/main/binary-amd64/Packages > apt-repo/dists/stable/main/binary-amd64/Packages.gz

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="WorldSim3" \
            -o APT::FTPArchive::Release::Label="WorldSim3" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="WorldSim3 APT repository" \
            release apt-repo/dists/stable > apt-repo/dists/stable/Release

      - name: Validate R2 deployment configuration
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          APT_BASE_URL: ${{ secrets.APT_BASE_URL }}
        run: |
          set -euo pipefail
          required=(
            "R2_ACCESS_KEY_ID"
            "R2_SECRET_ACCESS_KEY"
            "R2_BUCKET"
            "R2_ENDPOINT"
            "APT_BASE_URL"
          )
          for v in "${required[@]}"; do
            if [[ -z "${!v:-}" ]]; then
              echo "Missing required secret or variable: ${v}"
              exit 1
            fi
          done

      - name: Install AWS CLI
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends awscli

      - name: Publish APT repo to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          aws s3 sync apt-repo "s3://${R2_BUCKET}/worldsim3/apt" \
            --endpoint-url "${R2_ENDPOINT}" \
            --delete \
            --only-show-errors

          # APT index/metadata should refresh quickly for clients.
          aws s3 cp apt-repo/dists/stable/Release "s3://${R2_BUCKET}/worldsim3/apt/dists/stable/Release" \
            --endpoint-url "${R2_ENDPOINT}" \
            --cache-control "no-cache, max-age=0, must-revalidate" \
            --only-show-errors
          aws s3 cp apt-repo/dists/stable/main/binary-amd64/Packages "s3://${R2_BUCKET}/worldsim3/apt/dists/stable/main/binary-amd64/Packages" \
            --endpoint-url "${R2_ENDPOINT}" \
            --cache-control "no-cache, max-age=0, must-revalidate" \
            --only-show-errors
          aws s3 cp apt-repo/dists/stable/main/binary-amd64/Packages.gz "s3://${R2_BUCKET}/worldsim3/apt/dists/stable/main/binary-amd64/Packages.gz" \
            --endpoint-url "${R2_ENDPOINT}" \
            --cache-control "no-cache, max-age=0, must-revalidate" \
            --only-show-errors

          # Package payloads are content-addressed by filename and safe to cache.
          aws s3 cp apt-repo/pool/main/ "s3://${R2_BUCKET}/worldsim3/apt/pool/main/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --recursive \
            --cache-control "public, max-age=31536000, immutable" \
            --only-show-errors

      - name: Verify published R2 APT endpoints
        env:
          APT_BASE_URL: ${{ secrets.APT_BASE_URL }}
        run: |
          set -euo pipefail
          BASE_URL="${APT_BASE_URL%/}/worldsim3/apt"
          URLS=(
            "${BASE_URL}/dists/stable/Release"
            "${BASE_URL}/dists/stable/main/binary-amd64/Packages"
          )

          # Pages and DNS updates can be slightly delayed after push.
          for i in {1..12}; do
            all_ok=1
            for u in "${URLS[@]}"; do
              code="$(curl -sS -o /dev/null -w '%{http_code}' "$u" || true)"
              if [[ "$code" != "200" ]]; then
                echo "Expected HTTP 200 from ${u}, got ${code}"
                all_ok=0
                break
              fi
            done

            if [[ "$all_ok" -eq 1 ]]; then
              echo "APT endpoints are reachable."
              exit 0
            fi
            echo "APT endpoints not reachable yet (attempt ${i}/12); retrying in 10s..."
            sleep 10
          done

          echo "APT publish verification failed: expected endpoints are not reachable."
          exit 1
