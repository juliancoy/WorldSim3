name: Self-Hosted Runner Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  smoke:
    runs-on: [self-hosted, Linux, docker, node24]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Runner identity
        run: |
          echo "Runner: $RUNNER_NAME"
          uname -a
      - name: Docker check
        run: |
          docker --version
          docker run --rm node:24-alpine sh -lc "node -v && npm -v"
